name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Cache-bust JS imports with build timestamp
        run: |
          # 모든 ?v=숫자 를 빌드 타임스탬프(UNIX초)로 일괄 치환 → 매 배포마다 캐시 영구 무효화
          STAMP=$(date +%s)
          echo "Build timestamp: $STAMP"
          sed -i "s/?v=[0-9]\+/?v=$STAMP/g" index.html
          echo "Replaced ?v= count: $(grep -c "?v=$STAMP" index.html || echo 0)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
